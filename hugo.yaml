baseURL: "https://osloclojuremeetup.github.io/"
languageCode: no-nb
title: Oslo Clojure Meetup
theme: ["PaperMod"]

enableInlineShortcodes: true
enableRobotsTXT: true
enableEmoji: true
pygmentsUseClasses: true

minify:
    disableXML: true

outputs:
    home:
        - HTML
        - RSS
        - JSON

params:
    description: "Liste over tidligere Oslo Clojure meetups"

    defaultTheme: auto
    # disableThemeToggle: true
    # ShowShareButtons: true
    ShowReadingTime: true
    displayFullLangName: true
    ShowPostNavLinks: true
    # ShowBreadCrumbs: true
    ShowCodeCopyButtons: true
    ShowRssButtonInSectionTermList: true
    # ShowToc: true
    # comments: false

    homeInfoParams:
        Title: "Oslo Clojure Meetup"
        Content: >
          Hei og velkommen til Oslo Clojure Meetup sin nettside!


          Her finner du oversikt over tidligere meetups med tema, talere, dato, og referanser 😊


          Meetups arrangeres gjennom [Clojure/Oslo på Meetup.com](https://www.meetup.com/clojure-oslo/) og annonseres i kanalen #clojure-norway på [Clojurians-slacken](http://clojurians.net).


          Her kan du finne guide for å bidra med et nytt innslag: https://osloclojuremeetup.github.io/posts/bidra-med-nytt-innslag/
